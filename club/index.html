<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July Award 2026 - Facecard Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="brand">
                <h1>Facecard <span>Generator</span></h1>
                <p>Create your custom July Award 2026 poster</p>
            </div>

            <div class="control-group">
                <label for="image-upload" class="upload-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Upload Photo
                </label>
                <input type="file" id="image-upload" accept="image/jpeg, image/png, image/webp" hidden>
                <p class="help-text">For best results, use a portrait photo (4:5).</p>
            </div>

            <div class="control-group">
                <label for="zoom-slider">Zoom Image</label>
                <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1">
            </div>

            <div class="control-group">
                <label for="top-left-text">Top Left Text</label>
                <input type="text" id="top-left-text" value="A NETFLIX ORIGINAL SERIES">
            </div>

            <div class="control-group">
                <label for="top-right-text">Top Right Text</label>
                <input type="text" id="top-right-text" value="It's My">
            </div>

            <div class="control-group">
                <label for="big-text">Big Mask Text</label>
                <input type="text" id="big-text" value="DREAM">
            </div>

            <div class="control-group">
                <label for="bottom-title">Bottom Title</label>
                <input type="text" id="bottom-title" value="SETIAP ORANG PASTI PUNYA MIMPI">
            </div>

            <div class="control-group">
                <label for="bottom-body">Bottom Description</label>
                <textarea id="bottom-body" rows="4">begitu juga denganku
namun bagiku yang paling
penting adalah bukan seberapa
besar mimpi yang kita punya
tapi saat seberapa besar usahamu
untuk mewujudkan mimpi itu</textarea>
            </div>

            <button id="download-btn" class="primary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Facecard
            </button>
        </aside>

        <!-- Main Preview Area -->
        <main class="preview-area">
            <div class="canvas-container">
                <canvas id="facecard-canvas" width="1080" height="1350"></canvas>
                <div class="canvas-overlay-hint">Drag to reposition your photo</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
