<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robolution 2025 - Facecard Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="brand">
                <h1>Robolution <span>2025</span></h1>
                <p>Club Representative Card Generator</p>
            </div>

            <div class="control-section">
                <h3>1. Your Photo</h3>
                <div class="control-group">
                    <label for="image-upload" class="upload-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Upload Photo
                    </label>
                    <input type="file" id="image-upload" accept="image/jpeg, image/png, image/webp" hidden>
                </div>
                <div class="control-group">
                    <label for="zoom-slider">Zoom Photo</label>
                    <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1">
                </div>
            </div>

            <div class="control-section">
                <h3>2. Your Name</h3>
                <div class="control-group">
                    <label for="user-name">Full Name</label>
                    <input type="text" id="user-name" placeholder="e.g. MD Shahadat Hossain">
                </div>
            </div>

            <button id="download-btn" class="primary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Facecard
            </button>
            <p class="help-text" style="margin-top: 1rem; text-align: center;">Make sure you have template.jpg in the same folder!</p>
        </aside>

        <!-- Main Preview Area -->
        <main class="preview-area">
            <div class="canvas-container">
                <canvas id="facecard-canvas" width="1080" height="1350"></canvas>
                <div class="canvas-overlay-hint">Drag to reposition photo/logo</div>
                <div id="active-layer-indicator" class="active-layer-indicator">Moving: Photo</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
