<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Carnival 2026 - Photo Frame Generator</title>
    <meta name="description" content="Create your Mechanical Carnival 2026 photo frame! Upload your photo and share your #MechanicalCarnival2026 moment.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-badge">WUB</div>
                <h1>Mechanical <span>Carnival</span></h1>
                <p class="brand-sub">2026 Photo Frame Generator</p>
                <p class="brand-tagline">INNOVATE | DESIGN | BUILD | EXCEL</p>
            </div>

            <div class="control-section">
                <h3>📸 আপনার ছবি আপলোড করুন</h3>
                <div class="control-group">
                    <label for="image-upload" class="upload-btn" id="upload-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span>ছবি / গ্রুপ ছবি আপলোড করুন</span>
                        <small>JPG, PNG, WEBP</small>
                    </label>
                    <input type="file" id="image-upload" accept="image/jpeg, image/png, image/webp" hidden>
                </div>
            </div>

            <div class="control-section" id="photo-controls" style="display:none;">
                <h3>🔧 ছবি সাজান</h3>
                <div class="control-group">
                    <label for="zoom-slider">🔍 জুম করুন</label>
                    <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1">
                </div>
                <div class="drag-hint">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="15 19 12 22 9 19"></polyline><polyline points="19 9 22 12 19 15"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
                    ছবি drag করে সরাতে পারবেন
                </div>
            </div>

            <button id="download-btn" class="primary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Frame
            </button>

            <div class="share-tag">
                <p>#MechanicalCarnival2026</p>
                <small>World University of Bangladesh</small>
            </div>
        </aside>

        <!-- Main Preview Area -->
        <main class="preview-area">
            <div class="canvas-container">
                <canvas id="facecard-canvas" width="1080" height="1080"></canvas>
                <div class="canvas-overlay-hint" id="overlay-hint">⬅️ আপনার ছবি আপলোড করুন</div>
                <div id="active-layer-indicator" class="active-layer-indicator">📸 ছবি সরানো হচ্ছে...</div>
            </div>
        </main>
    </div>

    <script src="frame_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
